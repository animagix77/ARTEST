<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Real Reasons — 01 Cube Opens</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<style>
  html,body{margin:0;padding:0;color:#f5efe0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;height:100%;overflow:hidden;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  body{background:radial-gradient(ellipse at center,#1c1812 0%,#0d0c0a 55%,#050403 100%)}
  a-scene{position:fixed;inset:0;width:100vw !important;height:100vh !important}
  #hint{position:fixed;left:0;right:0;bottom:max(28px,env(safe-area-inset-bottom));text-align:center;z-index:9999;pointer-events:none;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,239,224,.55);font-weight:500}
  #hint b{color:#d4b36e;letter-spacing:.18em}
  #back{position:fixed;top:max(14px,env(safe-area-inset-top));left:14px;z-index:9999;background:rgba(0,0,0,.5);color:#f5efe0;padding:8px 12px;border-radius:999px;text-decoration:none;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1px solid rgba(245,239,224,.2);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  #replay{position:fixed;top:max(14px,env(safe-area-inset-top));right:14px;z-index:9999;background:rgba(212,179,110,.12);color:#d4b36e;padding:8px 14px;border-radius:999px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;border:1px solid rgba(212,179,110,.5);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);cursor:pointer;font-weight:600;font-family:inherit}
  .a-enter-vr,.a-enter-ar{display:none !important}
</style>
</head>
<body>
<a id="back" href="index.html">← All</a>
<button id="replay">↻ Replay</button>
<div id="hint">Tap anywhere to <b>replay</b></div>

<a-scene background="color: transparent" vr-mode-ui="enabled: false" renderer="antialias: true; alpha: true; colorManagement: true">
  <a-assets>
    <img id="portraitTexture" crossorigin="anonymous" src="https://images.unsplash.com/photo-1607746882042-944635dfe10e?w=600&h=600&fit=crop&crop=faces" />
  </a-assets>

  <a-light type="ambient" color="#3a2a18" intensity="0.45"></a-light>
  <a-light type="directional" position="3 5 4" color="#fff5dc" intensity="0.65"></a-light>
  <a-light type="point" position="-2 2 3" color="#d4b36e" intensity="0.5" distance="8"></a-light>
  <a-light type="point" position="0 0 2.5" color="#fff5d1" intensity="0.35" distance="5"></a-light>

  <a-camera position="0 0 4" wasd-controls-enabled="false" look-controls-enabled="false"></a-camera>

  <!-- Cube: 6 face planes -->
  <a-entity id="cube" position="0 0 0">
    <a-plane id="face-front"  position="0 0 0.5"  rotation="0 0 0"   width="1" height="1" material="color:#d4b36e; opacity:.92; side:double; emissive:#3a2a10; emissiveIntensity:.45"></a-plane>
    <a-plane id="face-back"   position="0 0 -0.5" rotation="0 180 0" width="1" height="1" material="color:#b89656; opacity:.92; side:double; emissive:#3a2a10; emissiveIntensity:.45"></a-plane>
    <a-plane id="face-right"  position="0.5 0 0"  rotation="0 90 0"  width="1" height="1" material="color:#c8a464; opacity:.92; side:double; emissive:#3a2a10; emissiveIntensity:.45"></a-plane>
    <a-plane id="face-left"   position="-0.5 0 0" rotation="0 -90 0" width="1" height="1" material="color:#a88846; opacity:.92; side:double; emissive:#3a2a10; emissiveIntensity:.45"></a-plane>
    <a-plane id="face-top"    position="0 0.5 0"  rotation="-90 0 0" width="1" height="1" material="color:#dcb978; opacity:.92; side:double; emissive:#3a2a10; emissiveIntensity:.45"></a-plane>
    <a-plane id="face-bottom" position="0 -0.5 0" rotation="90 0 0"  width="1" height="1" material="color:#9c7e3e; opacity:.92; side:double; emissive:#3a2a10; emissiveIntensity:.45"></a-plane>
  </a-entity>

  <!-- Reveal layer -->
  <a-entity id="reveal" visible="false" position="0 0 0">
    <a-plane id="cream-bg" width="1.4" height="1.4" position="0 0 -0.01" material="color:#f5efe0; opacity:0; transparent:true; side:double"></a-plane>
    <a-plane id="portrait" width="1.2" height="1.2" position="0 0 0" material="src:#portraitTexture; opacity:0; transparent:true; side:double"></a-plane>
    <a-text id="reason-tag" value="REAL REASON #03" position="0 0.85 0.01" align="center" width="3" color="#d4b36e" opacity="0"></a-text>
    <a-text id="patient-name" value="LANA  ·  gMG SINCE 2019" position="0 -0.78 0.01" align="center" width="3" color="#d4b36e" opacity="0"></a-text>
    <a-text id="patient-quote" value='"My granddaughter wants to call me, and I am the one who picks up now."' position="0 -1.0 0.01" align="center" width="2.6" color="#f5efe0" opacity="0" wrap-count="36"></a-text>
  </a-entity>
</a-scene>

<script>
  const FACES = ['face-front','face-back','face-right','face-left','face-top','face-bottom'];
  const ORIG = {'face-front':'0 0 0.5','face-back':'0 0 -0.5','face-right':'0.5 0 0','face-left':'-0.5 0 0','face-top':'0 0.5 0','face-bottom':'0 -0.5 0'};
  const OPEN = {'face-front':'0 0 1.6','face-back':'0 0 -1.6','face-right':'1.6 0 0','face-left':'-1.6 0 0','face-top':'0 1.6 0','face-bottom':'0 -1.6 0'};

  const cube = document.getElementById('cube');
  const reveal = document.getElementById('reveal');
  const portrait = document.getElementById('portrait');
  const cream = document.getElementById('cream-bg');
  const tagEl = document.getElementById('reason-tag');
  const nameEl = document.getElementById('patient-name');
  const quoteEl = document.getElementById('patient-quote');

  let busy = false;
  function reset(){
    FACES.forEach(id => {
      const el = document.getElementById(id);
      el.removeAttribute('animation__open');
      el.removeAttribute('animation__fade');
      el.setAttribute('position', ORIG[id]);
      el.setAttribute('material', 'opacity', 0.92);
    });
    cube.removeAttribute('animation__spin');
    cube.removeAttribute('animation__hover');
    cube.setAttribute('rotation','0 0 0');
    cube.setAttribute('position','0 0 0');
    reveal.setAttribute('visible','false');
    portrait.setAttribute('material','opacity', 0);
    cream.setAttribute('material','opacity', 0);
    tagEl.setAttribute('opacity', 0);
    nameEl.setAttribute('opacity', 0);
    quoteEl.setAttribute('opacity', 0);
  }

  function play(){
    if(busy) return;
    busy = true;
    reset();
    // gentle floating
    cube.setAttribute('animation__hover','property: position; to: 0 0.08 0; dir: alternate; loop: 4; dur: 1500; easing: easeInOutSine');
    // Phase 1: spin
    cube.setAttribute('animation__spin','property: rotation; to: 0 720 0; dur: 2200; easing: easeInOutCubic');
    // Phase 2: faces open + fade
    setTimeout(() => {
      FACES.forEach(id => {
        const el = document.getElementById(id);
        el.setAttribute('animation__open', `property: position; to: ${OPEN[id]}; dur: 1100; easing: easeOutQuart`);
        el.setAttribute('animation__fade', 'property: material.opacity; to: 0; dur: 1100; delay: 300');
      });
    }, 2200);
    // Phase 3: reveal patient
    setTimeout(() => {
      reveal.setAttribute('visible','true');
      cream.setAttribute('animation__in', 'property: material.opacity; from: 0; to: .15; dur: 800');
      portrait.setAttribute('animation__in','property: material.opacity; from: 0; to: 1; dur: 1100');
      tagEl.setAttribute('animation__in','property: opacity; from: 0; to: 1; dur: 600; delay: 200');
      nameEl.setAttribute('animation__in','property: opacity; from: 0; to: 1; dur: 600; delay: 600');
      quoteEl.setAttribute('animation__in','property: opacity; from: 0; to: 1; dur: 800; delay: 1000');
    }, 3300);
    // Auto-loop
    setTimeout(() => { busy = false; play(); }, 11000);
  }

  // Auto-start when scene is ready
  document.querySelector('a-scene').addEventListener('loaded', () => setTimeout(play, 400));
  // Tap to skip / replay
  function manualReplay(){ busy = false; play(); }
  document.getElementById('replay').addEventListener('click', manualReplay);
  document.body.addEventListener('click', (e) => { if(e.target.id !== 'back' && e.target.id !== 'replay') manualReplay(); });
</script>
</body>
</html>
