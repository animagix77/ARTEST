<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Real Reasons — 02 MG-ADL Explode</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<style>
  html,body{margin:0;padding:0;color:#f5efe0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;height:100%;overflow:hidden;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  body{background:radial-gradient(ellipse at center,#1c1812 0%,#0d0c0a 55%,#050403 100%)}
  a-scene{position:fixed;inset:0;width:100vw !important;height:100vh !important}
  #hint{position:fixed;left:0;right:0;bottom:max(28px,env(safe-area-inset-bottom));text-align:center;z-index:9999;pointer-events:none;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,239,224,.55);font-weight:500}
  #hint b{color:#d4b36e;letter-spacing:.18em}
  #back{position:fixed;top:max(14px,env(safe-area-inset-top));left:14px;z-index:9999;background:rgba(0,0,0,.5);color:#f5efe0;padding:8px 12px;border-radius:999px;text-decoration:none;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1px solid rgba(245,239,224,.2);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  #replay{position:fixed;top:max(14px,env(safe-area-inset-top));right:14px;z-index:9999;background:rgba(212,179,110,.12);color:#d4b36e;padding:8px 14px;border-radius:999px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;border:1px solid rgba(212,179,110,.5);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);cursor:pointer;font-weight:600;font-family:inherit}
  .a-enter-vr,.a-enter-ar{display:none !important}
</style>
</head>
<body>
<a id="back" href="index.html">← All</a>
<button id="replay">↻ Replay</button>
<div id="hint">The cube becomes the <b>8 MG-ADL items</b></div>

<a-scene background="color: transparent" vr-mode-ui="enabled: false" renderer="antialias: true; alpha: true; colorManagement: true">
  <a-light type="ambient" color="#3a2a18" intensity="0.45"></a-light>
  <a-light type="directional" position="3 5 4" color="#fff5dc" intensity="0.7"></a-light>
  <a-light type="point" position="-2 2 3" color="#d4b36e" intensity="0.5" distance="8"></a-light>

  <a-camera position="0 0 5" wasd-controls-enabled="false" look-controls-enabled="false"></a-camera>

  <!-- Parent cube -->
  <a-entity id="parent-cube" position="0 0 0">
    <a-box width="1" height="1" depth="1" material="color:#d4b36e; opacity:.9; transparent:true; emissive:#3a2a10; emissiveIntensity:.4"
           animation__spin="property: rotation; to: 0 360 0; loop: true; dur: 7000; easing: linear"></a-box>
  </a-entity>

  <!-- 8 mini cubes container -->
  <a-entity id="mini-cubes" position="0 0 0" visible="false"></a-entity>
</a-scene>

<script>
  const ITEMS = [
    { label: "TALKING",   color: "#d4b36e" },
    { label: "CHEWING",   color: "#c8a464" },
    { label: "SWALLOW",   color: "#b89656" },
    { label: "BRUSHING",  color: "#a88846" },
    { label: "RISING",    color: "#dcb978" },
    { label: "BREATHING", color: "#e6c688" },
    { label: "EYELID",    color: "#9c7e3e" },
    { label: "VISION",    color: "#bfa05a" },
  ];
  const RADIUS = 1.9;

  const container = document.getElementById('mini-cubes');
  ITEMS.forEach((item, i) => {
    const angle = (i / ITEMS.length) * Math.PI * 2;
    const x = Math.cos(angle) * RADIUS;
    const y = Math.sin(angle) * RADIUS * 0.55;
    const wrap = document.createElement('a-entity');
    wrap.dataset.targetX = x.toFixed(3);
    wrap.dataset.targetY = y.toFixed(3);
    wrap.setAttribute('position', '0 0 0');

    const box = document.createElement('a-box');
    box.setAttribute('width','0.55');
    box.setAttribute('height','0.55');
    box.setAttribute('depth','0.55');
    box.setAttribute('material', `color:${item.color}; opacity:.92; transparent:true; emissive:${item.color}; emissiveIntensity:.3`);
    box.setAttribute('animation__bob', `property: position; to: 0 0.12 0; dir: alternate; loop: true; dur: ${1800 + i*120}; easing: easeInOutSine`);
    box.setAttribute('animation__spin', `property: rotation; to: 0 360 0; loop: true; dur: ${5500 + i*300}; easing: linear`);
    wrap.appendChild(box);

    const label = document.createElement('a-text');
    label.setAttribute('value', item.label);
    label.setAttribute('position', '0 -0.55 0');
    label.setAttribute('align', 'center');
    label.setAttribute('width', '2.4');
    label.setAttribute('color', '#f5efe0');
    wrap.appendChild(label);

    container.appendChild(wrap);
  });

  // Slowly rotate the whole ring of cubes
  container.setAttribute('animation__ring','property: rotation; to: 0 360 0; loop: true; dur: 28000; easing: linear');

  let busy = false;
  function reset(){
    busy = false;
    const parent = document.getElementById('parent-cube');
    const parentBox = parent.querySelector('a-box');
    parentBox.removeAttribute('animation__pulse');
    parentBox.removeAttribute('animation__explode');
    parentBox.removeAttribute('animation__fade');
    parentBox.setAttribute('scale','1 1 1');
    parentBox.setAttribute('material','opacity', 0.9);
    parent.setAttribute('visible','true');
    container.setAttribute('visible','false');
    [...container.children].forEach(w => {
      w.removeAttribute('animation__deploy');
      w.setAttribute('position','0 0 0');
    });
  }

  function play(){
    if(busy) return;
    busy = true;
    reset();
    busy = true;
    const parent = document.getElementById('parent-cube');
    const parentBox = parent.querySelector('a-box');

    parentBox.setAttribute('animation__pulse','property: scale; to: 1.18 1.18 1.18; dir: alternate; loop: 2; dur: 700; easing: easeInOutSine');
    setTimeout(() => {
      parentBox.setAttribute('animation__explode','property: scale; to: 0.01 0.01 0.01; dur: 800; easing: easeInQuart');
      parentBox.setAttribute('animation__fade','property: material.opacity; to: 0; dur: 800');
    }, 1500);

    setTimeout(() => {
      container.setAttribute('visible','true');
      [...container.children].forEach((w, i) => {
        const tx = w.dataset.targetX, ty = w.dataset.targetY;
        w.setAttribute('position','0 0 0');
        w.setAttribute('animation__deploy', `property: position; to: ${tx} ${ty} 0; dur: 1100; delay: ${i*70}; easing: easeOutCubic`);
      });
    }, 2300);

    // Auto-loop
    setTimeout(() => { busy = false; play(); }, 14000);
  }

  document.querySelector('a-scene').addEventListener('loaded', () => setTimeout(play, 400));
  function manualReplay(){ busy = false; play(); }
  document.getElementById('replay').addEventListener('click', manualReplay);
  document.body.addEventListener('click', (e) => { if(e.target.id !== 'back' && e.target.id !== 'replay') manualReplay(); });
</script>
</body>
</html>
