<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Real Reasons — 04 Voice Cube</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<style>
  html,body{margin:0;padding:0;color:#f5efe0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;height:100%;overflow:hidden;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  body{background:radial-gradient(ellipse at center,#1c1812 0%,#0d0c0a 55%,#050403 100%)}
  a-scene{position:fixed;inset:0;width:100vw !important;height:100vh !important}
  #hint{position:fixed;left:0;right:0;bottom:max(28px,env(safe-area-inset-bottom));text-align:center;z-index:9999;pointer-events:none;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(245,239,224,.55);font-weight:500}
  #hint b{color:#d4b36e;letter-spacing:.18em}
  #back{position:fixed;top:max(14px,env(safe-area-inset-top));left:14px;z-index:9999;background:rgba(0,0,0,.5);color:#f5efe0;padding:8px 12px;border-radius:999px;text-decoration:none;font-size:11px;letter-spacing:.08em;text-transform:uppercase;border:1px solid rgba(245,239,224,.2);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  #replay{position:fixed;top:max(14px,env(safe-area-inset-top));right:14px;z-index:9999;background:rgba(212,179,110,.12);color:#d4b36e;padding:8px 14px;border-radius:999px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;border:1px solid rgba(212,179,110,.5);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);cursor:pointer;font-weight:600;font-family:inherit;display:none}
  #replay.show{display:block}
  #start{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9999;background:#d4b36e;color:#0d0c0a;border:none;padding:18px 30px;border-radius:999px;font-size:13px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;box-shadow:0 8px 32px rgba(212,179,110,.4);cursor:pointer;font-family:inherit}
  body.started #start{display:none}
  body:not(.started) #hint{display:none}
  body:not(.started) #replay{display:none !important}
  .a-enter-vr,.a-enter-ar{display:none !important}
</style>
</head>
<body>
<a id="back" href="index.html">← All</a>
<button id="replay">↻ Replay</button>
<button id="start">▶ Tap to begin</button>
<div id="hint">The cube will <b>speak</b></div>

<a-scene background="color: transparent" vr-mode-ui="enabled: false" renderer="antialias: true; alpha: true; colorManagement: true">
  <a-light type="ambient" color="#3a2a18" intensity="0.45"></a-light>
  <a-light type="directional" position="3 5 4" color="#fff5dc" intensity="0.65"></a-light>
  <a-light type="point" position="0 0 3" color="#d4b36e" intensity="0.7" distance="6"></a-light>

  <a-camera position="0 0 4.5" wasd-controls-enabled="false" look-controls-enabled="false"></a-camera>

  <!-- Voice cube -->
  <a-entity id="voice-cube" position="0 0 0">
    <a-box id="cube-body" width="1.3" height="1.3" depth="1.3"
           material="color:#d4b36e; opacity:.92; transparent:true; emissive:#d4b36e; emissiveIntensity:.6"
           animation__breathe="property: scale; to: 1.06 1.06 1.06; dir: alternate; loop: true; dur: 1800; easing: easeInOutSine"
           animation__spin="property: rotation; to: 0 360 0; loop: true; dur: 18000; easing: linear"></a-box>

    <!-- Concentric pulse rings -->
    <a-ring id="ring1" radius-inner="0.95" radius-outer="0.97" position="0 0 0" rotation="-90 0 0"
            material="color:#d4b36e; emissive:#d4b36e; emissiveIntensity:1; opacity:0; transparent:true; side:double"></a-ring>
    <a-ring id="ring2" radius-inner="1.30" radius-outer="1.32" position="0 0 0" rotation="-90 0 0"
            material="color:#d4b36e; emissive:#d4b36e; emissiveIntensity:1; opacity:0; transparent:true; side:double"></a-ring>
    <a-ring id="ring3" radius-inner="1.65" radius-outer="1.67" position="0 0 0" rotation="-90 0 0"
            material="color:#d4b36e; emissive:#d4b36e; emissiveIntensity:1; opacity:0; transparent:true; side:double"></a-ring>

    <a-text id="speak-name" value="MARCUS  ·  gMG SINCE 2017"
            position="0 1.4 0" align="center" width="4" color="#d4b36e" opacity="0"></a-text>
    <a-text id="speak-caption" value="" wrap-count="32"
            position="0 -1.4 0" align="center" width="4.5" color="#f5efe0" opacity="0"></a-text>
  </a-entity>
</a-scene>

<script>
  const LINES = [
    "Real Reason number five.",
    "I'm presenting at work again.",
    "I'm finishing my sentences.",
    "I'm not the patient in the room. I'm the man.",
  ];

  let started = false;
  let speaking = false;

  function pickVoice(){
    const all = speechSynthesis.getVoices();
    return all.find(v => /en[-_]US/i.test(v.lang) && /male|david|alex|daniel|fred/i.test(v.name)) ||
           all.find(v => /en/i.test(v.lang)) || all[0];
  }
  speechSynthesis.onvoiceschanged = () => { speechSynthesis.getVoices(); };

  function pulseRings(){
    ['ring1','ring2','ring3'].forEach((id, i) => {
      const el = document.getElementById(id);
      el.removeAttribute('animation__pulse');
      setTimeout(() => {
        el.setAttribute('animation__pulse','property: material.opacity; from: 0.85; to: 0; dur: 1500; easing: easeOutCubic');
      }, i * 280);
    });
  }

  function speak(){
    if(speaking) return;
    speaking = true;
    const cap = document.getElementById('speak-caption');
    const nm  = document.getElementById('speak-name');
    nm.setAttribute('animation__in', 'property: opacity; from: 0; to: 1; dur: 600');

    let i = 0;
    function next(){
      if(i >= LINES.length){
        nm.setAttribute('animation__out','property: opacity; from: 1; to: 0; dur: 600; delay: 800');
        cap.setAttribute('animation__out','property: opacity; from: 1; to: 0; dur: 600; delay: 800');
        setTimeout(() => { speaking = false; }, 1800);
        return;
      }
      const line = LINES[i++];
      cap.setAttribute('value', line);
      cap.setAttribute('animation__line','property: opacity; from: 0; to: 1; dur: 350');
      pulseRings();

      const u = new SpeechSynthesisUtterance(line);
      const v = pickVoice();
      if(v) u.voice = v;
      u.rate = 0.92; u.pitch = 0.95; u.volume = 1;
      u.onend = () => setTimeout(next, 700);
      // fallback if onend doesn't fire
      const fallback = setTimeout(next, 4500);
      u.onend = () => { clearTimeout(fallback); setTimeout(next, 700); };
      speechSynthesis.speak(u);
    }
    next();
  }

  document.getElementById('start').addEventListener('click', () => {
    started = true;
    document.body.classList.add('started');
    document.getElementById('replay').classList.add('show');
    // Warm up speech synth
    const warmup = new SpeechSynthesisUtterance(' ');
    warmup.volume = 0;
    speechSynthesis.speak(warmup);
    speechSynthesis.getVoices();
    setTimeout(speak, 400);
  });

  document.getElementById('replay').addEventListener('click', () => {
    if(speaking){ speechSynthesis.cancel(); speaking = false; }
    setTimeout(speak, 200);
  });
</script>
</body>
</html>
